services:
  - type: web
    name: evidrai-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: API_ALLOWED_ORIGINS
        value: http://localhost:3000
